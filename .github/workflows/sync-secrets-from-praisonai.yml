name: Sync Claude Secrets from PraisonAI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger PraisonAI secret sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run sync-secrets-to-aiui.yml \
            --repo MervinPraison/PraisonAI \
            --ref main \
            -f target_repo=MervinPraison/PraisonAI-Tools
          echo "Triggered secret sync → MervinPraison/PraisonAI-Tools"
